server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Disable gzip here — let the upstream reverse proxy handle compression.
    # Without this, a compressing proxy causes ERR_CONTENT_LENGTH_MISMATCH
    # because nginx already set Content-Length for the uncompressed size.
    gzip off;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
